<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Encounters – Soju Turn Tracker</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="dashboard-page">
    <header class="dash-header">
      <img src="/android-chrome-192x192.png" alt="" class="header-logo" aria-hidden="true">
      <h1>⚔️ My Encounters</h1>
      <div class="dash-user">
        <span id="username-display"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <div class="dash-content">
      <form class="create-room-form" id="create-room-form">
        <input type="text" name="name" placeholder="New encounter name…" required maxlength="60">
        <button type="submit" class="btn-primary">+ Create Encounter</button>
      </form>

      <div class="rooms-grid" id="rooms-grid">
        <div class="empty-rooms" id="empty-msg">Loading…</div>
      </div>
    </div>
  </div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
