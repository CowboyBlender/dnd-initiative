<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiative – Soju Turn Tracker</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="player-page">

    <header class="player-header">
      <img src="/android-chrome-192x192.png" alt="" class="header-logo" aria-hidden="true">
      <h1>⚔️ <span id="room-name">Connecting…</span></h1>
      <span class="player-round" id="round-display">Round 1</span>
    </header>

    <div class="player-body">
      <!-- Crossfade layer A -->
      <div id="spotlight-a" class="spotlight-layer"></div>
      <!-- Crossfade layer B -->
      <div id="spotlight-b" class="spotlight-layer"></div>

      <!-- Initiative overlay panel (right) -->
      <aside class="player-initiative" id="player-initiative">
        <div class="initiative-panel-label">Initiative Order</div>
        <div id="player-combatants-list">
          <div class="connecting-msg">Waiting…</div>
        </div>
      </aside>
    </div>

  </div>
  <script src="/js/player.js"></script>
</body>
</html>
